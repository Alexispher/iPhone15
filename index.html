<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AstroCam PEGASUS Stacker</title>
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        
        #viewfinder {
            position: relative;
            width: 100vw;
            height: 65vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* O vídeo ao vivo. Ele será escondido após a captura para mostrar o resultado */
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* O canvas que mostrará o crop 500x500 empilhado final */
        #result-canvas { display: none; width: 100%; height: 100%; object-fit: contain; background: #111; }
        
        /* Canvas de extração offscreen (nunca aparece na tela) */
        #extract-canvas { display: none; }

        .crosshair { position: absolute; width: 80px; height: 80px; border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; pointer-events: none; }
        .crosshair::before, .crosshair::after { content: ''; position: absolute; background: rgba(0, 255, 204, 0.6); }
        .crosshair::before { top: 39px; left: -10px; width: 100px; height: 2px; }
        .crosshair::after { top: -10px; left: 39px; width: 2px; height: 100px; }

        #panel { padding: 20px; background: #121212; flex-grow: 1; display: flex; flex-direction: column; gap: 15px; border-top: 1px solid #333; }
        
        #log { font-family: monospace; font-size: 13px; color: #00ffcc; background: #1a1a1a; padding: 10px; border-radius: 6px; height: 60px; overflow-y: auto; }
        
        #capture-btn { background: #fff; color: #000; border: none; padding: 18px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        #capture-btn:disabled { background: #333; color: #666; }
        
        #download-btn { display: none; background: #00ffcc; color: #000; border: none; padding: 18px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="viewfinder">
        <video id="video" autoplay playsinline></video>
        <canvas id="result-canvas"></canvas>
        <div class="crosshair" id="mira"></div>
    </div>

    <canvas id="extract-canvas"></canvas>

    <div id="panel">
        <div id="log">Aguardando inicialização...</div>
        <button id="capture-btn">Capturar (100 Frames)</button>
        <button id="download-btn">Salvar Empilhamento Final</button>
    </div>

    <script>
        const AstroCam = {
            stream: null,
            track: null,
            video: document.getElementById("video"),
            extractCanvas: document.getElementById("extract-canvas"),
            resultCanvas: document.getElementById("result-canvas"),
            ctx: null,
            width: 0,
            height: 0,
            frames: [], // Aqui guardaremos os patches de 500x500
            NUM_FRAMES: 100,
            ROI_SIZE: 500,
            logEl: document.getElementById("log"),
            btn: document.getElementById("capture-btn"),
            downBtn: document.getElementById("download-btn"),
            mira: document.getElementById("mira")
        };

        AstroCam.ctx = AstroCam.extractCanvas.getContext("2d", { willReadFrequently: true });

        function log(msg) {
            AstroCam.logEl.innerText = msg;
            console.log(msg);
        }

        async function startCamera() {
            try {
                AstroCam.stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 4096 }, height: { ideal: 2160 } },
                    audio: false
                });

                AstroCam.track = AstroCam.stream.getVideoTracks()[0];
                AstroCam.video.srcObject = AstroCam.stream;

                AstroCam.video.onloadedmetadata = () => {
                    const settings = AstroCam.track.getSettings();
                    AstroCam.width = settings.width || AstroCam.video.videoWidth;
                    AstroCam.height = settings.height || AstroCam.video.videoHeight;
                    
                    AstroCam.extractCanvas.width = AstroCam.width;
                    AstroCam.extractCanvas.height = AstroCam.height;
                    
                    log(`Sensor ativo: ${AstroCam.width}x${AstroCam.height}`);
                };
            } catch (e) {
                log("Erro na câmera: " + e.message);
            }
        }

        // Procura a lua de forma sub-amostrada para não travar o loop de captura
        function detectMoon() {
            AstroCam.ctx.drawImage(AstroCam.video, 0, 0, AstroCam.width, AstroCam.height);
            const frame = AstroCam.ctx.getImageData(0, 0, AstroCam.width, AstroCam.height);
            const data = frame.data;
            const w = frame.width;
            const h = frame.height;
            
            let max = 0, maxX = w / 2, maxY = h / 2;

            // Pula de 8 em 8 para ser rápido
            for(let y = 0; y < h; y += 8){
                for(let x = 0; x < w; x += 8){
                    const i = (y * w + x) * 4;
                    const b = data[i] + data[i+1] + data[i+2]; // Soma simples de brilho
                    if(b > max){
                        max = b;
                        maxX = x;
                        maxY = y;
                    }
                }
            }

            // Calcula o ROI respeitando os limites da imagem original
            let rx = Math.max(0, maxX - (AstroCam.ROI_SIZE / 2));
            let ry = Math.max(0, maxY - (AstroCam.ROI_SIZE / 2));
            
            if (rx + AstroCam.ROI_SIZE > w) rx = w - AstroCam.ROI_SIZE;
            if (ry + AstroCam.ROI_SIZE > h) ry = h - AstroCam.ROI_SIZE;

            return { x: rx, y: ry, w: AstroCam.ROI_SIZE, h: AstroCam.ROI_SIZE };
        }

        // Calcula nitidez usando diferença de gradiente
        function sharpness(imageData) {
            const d = imageData.data;
            const w = imageData.width;
            const h = imageData.height;
            let score = 0;

            // Analisa um miolo menor para otimizar processamento
            for(let y = 100; y < h - 100; y += 2) {
                for(let x = 100; x < w - 100; x += 2) {
                    const i = (y * w + x) * 4;
                    const j = (y * w + x + 1) * 4; // pixel adjacente
                    score += Math.abs(d[i] - d[j]);
                }
            }
            return score;
        }

        function createAccumulator(width, height) {
            return {
                width, height,
                r: new Float32Array(width * height),
                g: new Float32Array(width * height),
                b: new Float32Array(width * height)
            };
        }

        function addFrame(accumulator, image) {
            const src = image.data;
            const pixels = image.width * image.height;
            for(let i = 0; i < pixels; i++) {
                const j = i * 4;
                accumulator.r[i] += src[j];
                accumulator.g[i] += src[j+1];
                accumulator.b[i] += src[j+2];
            }
        }

        function accumulatorToImage(accumulator, numFrames) {
            const out = new ImageData(accumulator.width, accumulator.height);
            const dst = out.data;
            const pixels = accumulator.width * accumulator.height;
            for(let i = 0; i < pixels; i++) {
                const j = i * 4;
                dst[j]   = accumulator.r[i] / numFrames;
                dst[j+1] = accumulator.g[i] / numFrames;
                dst[j+2] = accumulator.b[i] / numFrames;
                dst[j+3] = 255;
            }
            return out;
        }

        async function startPipeline() {
            AstroCam.btn.disabled = true;
            AstroCam.frames = [];
            
            // FASE 1: CAPTURA (CROP ON THE FLY)
            log("1/4: Capturando frames brutos...");
            for(let i = 0; i < AstroCam.NUM_FRAMES; i++) {
                const roi = detectMoon();
                // Extrai APENAS o 500x500 e joga na memória. (Evita estouro de RAM no Safari)
                const patch = AstroCam.ctx.getImageData(roi.x, roi.y, roi.w, roi.h);
                AstroCam.frames.push(patch);
                
                if (i % 10 === 0) log(`Gravando: ${i}/${AstroCam.NUM_FRAMES}`);
                await new Promise(r => setTimeout(r, 16)); // ~60fps tempo de respiro pro navegador
            }

            // FASE 2: ANÁLISE DE NITIDEZ
            log("2/4: Analisando distorção atmosférica...");
            // Usando setTimeout para a interface atualizar antes do processamento pesado
            await new Promise(r => setTimeout(r, 50)); 
            
            const ranked = AstroCam.frames.map(frame => {
                return { frame, score: sharpness(frame) };
            });

            ranked.sort((a, b) => b.score - a.score); // Maior score (mais nítido) primeiro
            
            // FASE 3: STACKING DOS MELHORES
            const NUM_BEST = 20;
            log(`3/4: Empilhando os ${NUM_BEST} melhores frames...`);
            await new Promise(r => setTimeout(r, 50));

            const bestFrames = ranked.slice(0, NUM_BEST).map(r => r.frame);
            const acc = createAccumulator(AstroCam.ROI_SIZE, AstroCam.ROI_SIZE);

            for(const frame of bestFrames) {
                addFrame(acc, frame);
            }

            // FASE 4: RENDERIZAÇÃO
            log("4/4: Finalizando imagem...");
            const finalImage = accumulatorToImage(acc, NUM_BEST);
            
            // Esconde o vídeo e mostra o Canvas de resultado
            AstroCam.video.style.display = "none";
            AstroCam.mira.style.display = "none";
            AstroCam.resultCanvas.style.display = "block";
            AstroCam.resultCanvas.width = AstroCam.ROI_SIZE;
            AstroCam.resultCanvas.height = AstroCam.ROI_SIZE;
            
            const resultCtx = AstroCam.resultCanvas.getContext("2d");
            resultCtx.putImageData(finalImage, 0, 0);

            log("Empilhamento concluído com sucesso.");
            AstroCam.downBtn.style.display = "block";
            AstroCam.btn.innerText = "Tentar Novamente";
            AstroCam.btn.disabled = false;
        }

        AstroCam.btn.addEventListener('click', () => {
            if (AstroCam.video.style.display === "none") {
                // Reset da UI para tentar de novo
                AstroCam.video.style.display = "block";
                AstroCam.mira.style.display = "block";
                AstroCam.resultCanvas.style.display = "none";
                AstroCam.downBtn.style.display = "none";
                AstroCam.btn.innerText = "Capturar (100 Frames)";
            } else {
                startPipeline();
            }
        });

        AstroCam.downBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.href = AstroCam.resultCanvas.toDataURL('image/png');
            link.download = `AstroPegasus_Stack_${Date.now()}.png`;
            link.click();
        });

        startCamera();
    </script>
</body>
</html>
