<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AstroCam Stacker Web</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        #camera-container { position: relative; width: 100vw; height: 70vh; background: #111; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Canvas de processamento fica escondido, mostramos apenas o vídeo ao vivo */
        #process-canvas { display: none; }
        
        .crosshair { position: absolute; width: 60px; height: 60px; pointer-events: none; border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; }
        .crosshair::before, .crosshair::after { content: ''; position: absolute; background: rgba(0, 255, 204, 0.8); }
        .crosshair::before { top: 29px; left: -10px; width: 80px; height: 1px; }
        .crosshair::after { top: -10px; left: 29px; width: 1px; height: 80px; }

        #controls { width: 100%; padding: 20px; box-sizing: border-box; background: #121212; display: flex; flex-direction: column; gap: 15px; height: 30vh; }
        
        #capture-btn { background: #00ffcc; color: #000; border: none; padding: 18px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 8px; }
        #capture-btn:disabled { background: #333; color: #666; }
        
        #status { font-size: 12px; font-family: monospace; color: #00ffcc; text-align: center; min-height: 15px; }
        
        #debug { background: #330000; color: #ff6666; padding: 10px; font-size: 11px; display: none; width: 100%; box-sizing: border-box; word-wrap: break-word; font-family: monospace; }
    </style>
</head>
<body>

    <div id="debug"></div>

    <div id="camera-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="process-canvas"></canvas>
        <div class="crosshair"></div>
    </div>

    <div id="controls">
        <div id="status">Aguardando câmera...</div>
        <button id="capture-btn">Capturar (Empilhar 20 Frames)</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('process-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const captureBtn = document.getElementById('capture-btn');
        const statusTxt = document.getElementById('status');
        const debug = document.getElementById('debug');

        const NUM_FRAMES = 20;
        let stream;

        function logInfo(msg, isError = false) {
            if (isError) {
                debug.style.display = 'block';
                debug.innerText += "\n[ERRO] " + msg;
            }
            statusTxt.innerText = msg;
        }

        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 4096 }, height: { ideal: 2160 } },
                    audio: false
                });
                
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    const settings = stream.getVideoTracks()[0].getSettings();
                    // Logamos a resolução real que a Apple nos entregou
                    logInfo(`Câmera Ativa: ${settings.width}x${settings.height}`);
                    canvas.width = settings.width;
                    canvas.height = settings.height;
                };

            } catch (err) {
                logInfo(err.name + ": " + err.message, true);
            }
        }

        // Função para achar o centro de luz (A Lua) no frame
        function findLightCenter(context, width, height) {
            const imgData = context.getImageData(0, 0, width, height).data;
            let sumX = 0, sumY = 0, count = 0;
            
            // Pula de 4 em 4 pixels para processar rápido no celular
            for (let y = 0; y < height; y += 4) {
                for (let x = 0; x < width; x += 4) {
                    const i = (y * width + x) * 4;
                    // Calcula brilho (Luminância simplificada)
                    const brightness = (imgData[i] + imgData[i+1] + imgData[i+2]) / 3;
                    
                    // Se for muito brilhante (parte da lua), usamos como âncora
                    if (brightness > 200) {
                        sumX += x;
                        sumY += y;
                        count++;
                    }
                }
            }
            
            if (count === 0) return { x: width/2, y: height/2, found: false };
            return { x: sumX / count, y: sumY / count, found: true };
        }

        async function captureAndStack() {
            captureBtn.disabled = true;
            
            const frames = [];
            const w = canvas.width;
            const h = canvas.height;

            // 1. Fase de Captura Rápida
            logInfo("Gravando frames...");
            for (let i = 0; i < NUM_FRAMES; i++) {
                // Desenha o vídeo atual num canvas offscreen
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = w; tempCanvas.height = h;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.drawImage(video, 0, 0, w, h);
                frames.push(tempCanvas);
                
                // Pequena pausa para garantir que os frames sejam um pouco diferentes
                await new Promise(r => setTimeout(r, 50)); 
            }

            // 2. Fase de Processamento e Alinhamento
            logInfo("Alinhando e Empilhando...");
            
            // Usar o primeiro frame como referência
            ctx.clearRect(0, 0, w, h);
            const refCtx = frames[0].getContext('2d');
            const refCenter = findLightCenter(refCtx, w, h);

            // Se não achou a lua, apenas sobrepõe normal (sem alinhamento)
            if (!refCenter.found) {
                logInfo("Lua não detectada. Empilhamento simples...", true);
            }

            for (let i = 0; i < NUM_FRAMES; i++) {
                const currentFrame = frames[i];
                ctx.save();
                
                // A mágica matemática do empilhamento: 
                // Frame 1 = 100% opacidade, Frame 2 = 50%, Frame 3 = 33%...
                // Isso tira a média perfeita de todos os pixels, eliminando o ruído.
                ctx.globalAlpha = 1 / (i + 1); 

                if (refCenter.found) {
                    const currentCtx = currentFrame.getContext('2d');
                    const currentCenter = findLightCenter(currentCtx, w, h);
                    
                    // Calcula o quanto sua mão tremeu em relação ao primeiro frame
                    const dx = refCenter.x - currentCenter.x;
                    const dy = refCenter.y - currentCenter.y;
                    
                    // Move o canvas para compensar o tremor da mão
                    ctx.translate(dx, dy);
                }

                ctx.drawImage(currentFrame, 0, 0, w, h);
                ctx.restore();
                
                logInfo(`Empilhando ${i+1}/${NUM_FRAMES}`);
            }

            // 3. Exportar resultado final em PNG
            logInfo("Processamento concluído. Salvando PNG...");
            const dataURL = canvas.toDataURL('image/png'); // Exporta em PNG (sem perdas)
            const link = document.createElement('a');
            link.href = dataURL;
            link.download = `AstroStack_${Date.now()}.png`;
            link.click();

            captureBtn.disabled = false;
            logInfo(`Pronto. Resolução Real: ${w}x${h}`);
        }

        captureBtn.addEventListener('click', captureAndStack);

        initCamera();
    </script>
</body>
</html>
